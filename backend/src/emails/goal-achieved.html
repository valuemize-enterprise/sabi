<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Goal Achieved</title></head>
<body style="margin:0;padding:0;background-color:#0d0d1a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#0d0d1a;padding:40px 20px;">
    <tr><td align="center">
      <table width="580" cellpadding="0" cellspacing="0" style="max-width:580px;width:100%;">
        <tr>
          <td align="center" style="padding-bottom:32px;">
            <table cellpadding="0" cellspacing="0"><tr>
              <td style="background-color:#1a1040;border:1px solid #3b2d6e;border-radius:12px;padding:12px 24px;">
                <span style="color:#a78bfa;font-size:18px;font-weight:800;letter-spacing:1px;">SABI</span>
                <span style="color:#4a3880;font-size:18px;"> Intelligence Suite</span>
              </td>
            </tr></table>
          </td>
        </tr>
        <tr>
          <td style="background-color:#12122a;border:1px solid #1e1550;border-radius:16px;padding:40px 40px 32px;text-align:center;">
            <p style="font-size:48px;margin:0 0 16px;">🎯</p>
            <p style="color:#a78bfa;font-size:12px;font-weight:600;letter-spacing:3px;text-transform:uppercase;margin:0 0 8px;">Goal Achieved</p>
            <h1 style="color:#ffffff;font-size:26px;font-weight:700;margin:0 0 12px;">A brand goal has been hit!</h1>
            <p style="color:#94a3b8;font-size:15px;line-height:1.6;margin:0 0 28px;">
              Hi {{staffName}}, the goal <strong style="color:#ffffff;">"{{goalTitle}}"</strong>
              for <strong style="color:#ffffff;">{{brandName}}</strong> has been achieved.
              Target: <strong style="color:#10b981;">{{targetValue}} {{unit}}</strong>
            </p>
            <table cellpadding="0" cellspacing="0" style="margin:0 auto 28px;"><tr>
              <td style="background-color:#0a2e1a;border:1px solid #10b98140;border-radius:12px;padding:16px 32px;text-align:center;">
                <p style="color:#64748b;font-size:11px;text-transform:uppercase;letter-spacing:2px;margin:0 0 4px;">Target Achieved</p>
                <p style="color:#10b981;font-size:28px;font-weight:800;margin:0;">{{targetValue}} {{unit}}</p>
              </td>
            </tr></table>
            <a href="{{brandsUrl}}" style="display:inline-block;background-color:#6d28d9;color:#ffffff;font-size:15px;font-weight:600;text-decoration:none;padding:14px 40px;border-radius:10px;">View Brand →</a>
          </td>
        </tr>
        <tr><td align="center" style="padding:24px 0 0;">
          <p style="color:#2d2d4e;font-size:12px;margin:0;">Cerebre Media Africa · Sabi Intelligence Suite</p>
        </td></tr>
      </table>
    </td></tr>
  </table>
</body>
</html>
